<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sua Loja</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }
    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      padding: 20px;
    }
    .produto {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      text-align: center;
    }
    .produto img {
      width: 100%;
      max-width: 200px;
    }
    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
    .whatsapp-fixo {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      padding: 15px;
      border-radius: 50%;
      text-decoration: none;
      font-size: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Sua Loja</h1>
  <p>Compre fácil pelo WhatsApp</p>
</header>

<div class="container">

  <div class="produto">
    <img src="https://via.placeholder.com/200" alt="">
    <h2>Produto 1</h2>
    <p>R$ 50,00</p>
    <a class="btn" href="https://wa.me/5591999999999?text=Quero%20comprar%20Produto%201">Comprar no WhatsApp</a>
  </div>

  <div class="produto">
    <img src="https://via.placeholder.com/200" alt="">
    <h2>Produto 2</h2>
    <p>R$ 80,00</p>
    <a class="btn" href="https://wa.me/5591999999999?text=Quero%20comprar%20Produto%202">Comprar no WhatsApp</a>
  </div>

</div>

<a class="whatsapp-fixo" href="https://wa.me/5591999999999">💬</a>

</body>
</html>

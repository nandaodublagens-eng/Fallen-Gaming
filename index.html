<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fallen Gaming</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* MENU */
nav {
  background: #000;
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

nav h1 {
  color: #00ffcc;
}

nav a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
}

/* BANNER */
.banner {
  height: 300px;
  background: linear-gradient(45deg, #000, #222);
  display: flex;
  align-items: center;
  justify-content: center;
}

.banner h2 {
  font-size: 30px;
}

/* PRODUTOS */
.container {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.produto {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
}

.produto img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.btn {
  display: block;
  background: #00ffcc;
  color: black;
  padding: 10px;
  text-align: center;
  margin-top: 10px;
  border-radius: 5px;
  text-decoration: none;
}

/* WHATSAPP */
.whats {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  color: white;
  text-decoration: none;
}
</style>
</head>

<body>

<nav>
  <h1>Fallen Gaming</h1>
  <div>
    <a href="#">Início</a>
    <a href="#">Produtos</a>
    <a href="#">Contato</a>
  </div>
</nav>

<div class="banner">
  <h2>🔥 PROMOÇÕES GAMER 🔥</h2>
</div>

<div class="container">
  <div class="grid">

    <div class="produto">
      <img src="LINK_IMAGEM">
      <h3>Produto 1</h3>
      <p>R$ 500</p>
      <a class="btn" href="https://wa.me/5591982664068?text=Quero%20Produto%201">
        Comprar
      </a>
    </div>

    <div class="produto">
      <img src="LINK_IMAGEM">
      <h3>Produto 2</h3>
      <p>R$ 800</p>
      <a class="btn" href="https://wa.me/5591982664068?text=Quero%20Produto%202">
        Comprar
      </a>
    </div>

  </div>
</div>

<a class="whats" href="https://wa.me/5591982664068">💬</a>

</body>
</html>
